$mainMod = SUPER
$terminal= kitty
$fileManager= nautilus
$menu= rofi -show run

bind = $mainMod, Return, exec, $terminal
bind= $mainMod, X, killactive,
bind= $mainMod SHIFT, C, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind= $mainMod, E, exec, $fileManager
bind= $mainMod, V, togglefloating,
bind= $mainMod, R, exec, $menu
bind= $mainMod, M, fullscreen, 1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -------------------------------------------------------------
# 1. ALTERNAR ENTRE WORKSPACES (Super + Número)
# ---------------------------q----------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -------------------------------------------------------------
# 2. MOVER JANELA ATIVA PARA UM WORKSPACE (Super + Shift + Número)
# -------------------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------------------------------------------------------------------------
# Mover o foco entre janelas usando o padrão Vim (H, J, K, L)
# -------------------------------------------------------------------------
bind = $mainMod, H, movefocus, l  # Foco para a Esquerda (Left)
bind = $mainMod, L, movefocus, r  # Foco para a Direita (Right)
bind = $mainMod, K, movefocus, u  # Foco para Cima (Up)
bind = $mainMod, J, movefocus, d  # Foco para Baixo (Down)




exec-once = waybar
exec-once = waypaper --wallpaper ~/Imagens/cozy-morning-stretch-cute-cat-pink-blanket.jpg

input {
    kb_layout = br
    kb_variant =         # Pode deixar em branco para o ABNT2 padrão
    kb_model =           # Pode deixar em branco
    kb_options =         # Pode deixar em branco
    kb_rules =

    follow_mouse = 1
    # ... outras configurações de mouse que já estavam aqui
}

# -------------------------------------------------------------------------
# DESATIVAR LOGO/WALLPAPER PADRAO DO HYPR
# -------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# -------------------------------------------------------------------------
# EFEITOS VISUAIS
# -------------------------------------------------------------------------

decoration {
    rounding = 8 # Cantos arredondados nas janelas
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = true # Faz janelas flutuantes mostrarem o wallpaper através do blur, ignorando janelas de baixo
    }

    # Ative sombras para dar profundidade ao setup
    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(1a1a1aee)
    }
}
