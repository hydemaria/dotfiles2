$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show run -theme ~/.config/rofi/config.rasi

# -------------------------------------------------------------
# ATALHOS DO SISTEMA
# -------------------------------------------------------------
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, X, killactive
bind = $mainMod SHIFT, C, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, S, exec, ~/.local/bin/screenshot.sh

# O Toggle de Maximizar Perfeito (Modo 2 garante o vai-e-volta mantendo a Waybar)
bind = $mainMod, M, fullscreen, 2

# Controles do Mouse (Mover e Redimensionar)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -------------------------------------------------------------
# 1. ALTERNAR ENTRE WORKSPACES (Super + Número)
# -------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# -------------------------------------------------------------
# 2. MOVER JANELA ATIVA PARA UM WORKSPACE (Super + Shift + Número)
# -------------------------------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------------------------------------------------------------------------
# MOVER O FOCO ENTRE JANELAS (Padrão Vim: H, J, K, L)
# -------------------------------------------------------------------------
bind = $mainMod, H, movefocus, l  # Foco para a Esquerda
bind = $mainMod, L, movefocus, r  # Foco para a Direita
bind = $mainMod, K, movefocus, u  # Foco para Cima
bind = $mainMod, J, movefocus, d  # Foco para Baixo

# -------------------------------------------------------------------------
# INICIALIZAÇÃO DE APPS (AUTOSTART)
# -------------------------------------------------------------------------
exec-once = waybar
# Adicionado --headless para o waypaper rodar limpo em segundo plano
exec-once = waypaper --headless --wallpaper ~/Imagens/cozy-morning-stretch-cute-cat-pink-blanket.jpg

# -------------------------------------------------------------------------
# CONFIGURAÇÃO DE TECLADO E MOUSE
# -------------------------------------------------------------------------
input {
    kb_layout = br
    kb_variant =         
    kb_model =           
    kb_options =         
    kb_rules =

    follow_mouse = 1
}

# -------------------------------------------------------------------------
# CONFIGURAÇÕES GERAIS (DESATIVAR LOGOS)
# -------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# -------------------------------------------------------------------------
# EFEITOS VISUAIS (BLUR E SOMBRAS)
# -------------------------------------------------------------------------
decoration {
    rounding = 8 
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = true 
    }

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    # Criamos uma curva suave chamada "suave"
    bezier = suave, 0.25, 1, 0.5, 1

    # Aplicamos a curva com uma velocidade confortável (maior número = mais lento)
    animation = windows, 1, 6, suave
    animation = workspaces, 1, 5, suave
}


general {
    col.active_border = rgba(ffb6c1ee)
    col.inactive_border = rgba(595959aa)

    gaps_in = 5
    gaps_out = 10
}

exec-once = waybar