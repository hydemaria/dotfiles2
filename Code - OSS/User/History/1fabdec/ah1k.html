<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataBill - Gestão de Alertas de Faturamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Efeito de transição suave para revelar o painel */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 relative">

    <div id="tela-bloqueio" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-2xl max-w-md w-full text-center">
            <div class="bg-indigo-100 text-indigo-700 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-100">
                <i class="fa-solid fa-lock text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Acesso Restrito</h2>
            <p class="text-sm text-slate-400 mt-2 mb-6">Insira a chave de segurança para acessar o painel do DataBill.</p>
            
            <form id="form-login" class="space-y-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-key"></i>
                    </span>
                    <input type="password" id="senha_acesso" required
                        class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-sm transition-all"
                        placeholder="Digite a senha de acesso">
                </div>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-100 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-unlock text-xs"></i> Desbloquear Painel
                </button>
            </form>
            <p class="text-[11px] text-slate-400 mt-6">Apenas funcionários autorizados do setor financeiro.</p>
        </div>
    </div>

    <div id="painel-conteudo" class="opacity-0 transition-opacity duration-500">
